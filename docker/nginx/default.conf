server {
    listen 80;
    server_name vedantbilling.com www.vedantbilling.com;
    root /var/www/frontend; # This will be mounted from frontend container or volume
    index index.html;

    # Frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API
    location /api {
        alias /var/www/backend/public; # Laravel public dir
        try_files $uri $uri/ @laravel;
    }
    
    # Storage (Images/Uploads)
    location /storage {
        alias /var/www/backend/public/storage;
        try_files $uri $uri/ =404;
    }

    location @laravel {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
